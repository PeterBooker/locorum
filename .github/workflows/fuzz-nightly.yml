name: Fuzz nightly

on:
  schedule:
    # 04:00 UTC every day. Cosmic-noise hour, low CI-queue contention.
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  fuzz-long:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Gio Linux deps
        run: ./scripts/install-gio-deps-linux.sh
      - name: Long fuzz seeds
        run: make fuzz-nightly
      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: fuzz-corpus
          path: |
            **/testdata/fuzz/**/*
          if-no-files-found: ignore
      - name: File issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `fuzz nightly failed: ${context.sha.slice(0,7)}`;
            const body = [
              'The nightly fuzz job found a crash.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: ${context.sha}`,
              '',
              'Inspect the uploaded `fuzz-corpus` artifact for the new seed inputs.',
            ].join('\n');
            const open = await github.rest.issues.listForRepo({
              ...context.repo,
              labels: 'fuzz,bug',
              state: 'open',
            });
            const exists = open.data.some(i => i.title === title);
            if (exists) return;
            await github.rest.issues.create({ ...context.repo, title, body, labels: ['fuzz','bug'] });

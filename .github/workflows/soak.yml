name: Soak + chaos nightly

on:
  schedule:
    # 06:00 UTC every day.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  soak:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Install Gio Linux deps
        run: ./scripts/install-gio-deps-linux.sh
      - name: Verify Docker
        run: docker info
      - name: Pre-pull images
        run: ./scripts/integration-prepull.sh
      - name: Soak suite
        run: |
          go test -count=1 -tags='integration,soak' -timeout=70m \
            ./internal/sites/... ./internal/router/... ./internal/docker/...
      - name: Chaos suite
        # Chaos tests deliberately break the environment mid-op; on a CI
        # runner that's a fresh VM, restart-docker tactics are safe. The
        # chaos build tag is gated separately so flaky chaos noise doesn't
        # mask real soak regressions.
        run: |
          go test -count=1 -tags='integration,chaos' -timeout=20m \
            ./internal/sites/... ./internal/router/... ./internal/docker/...
      - name: File issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `soak nightly failed: ${context.sha.slice(0,7)}`;
            const body = [
              'The nightly soak/chaos run failed.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: ${context.sha}`,
            ].join('\n');
            const open = await github.rest.issues.listForRepo({
              ...context.repo,
              labels: 'soak,bug',
              state: 'open',
            });
            const sevenDaysAgo = new Date(Date.now() - 7 * 86400 * 1000);
            const recent = open.data.find(i =>
              i.title === title && new Date(i.created_at) > sevenDaysAgo
            );
            if (recent) return;
            await github.rest.issues.create({ ...context.repo, title, body, labels: ['soak','bug'] });

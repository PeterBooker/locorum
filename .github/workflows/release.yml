name: Release

on:
  push:
    tags:
      # Bare semver tags: 1.0.0, 0.1.0-rc1, etc. (no "v" prefix).
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist, e.g. 0.1.0)'
        required: true

permissions:
  contents: read

env:
  # ubuntu-22.04 has glibc 2.35 — older than the rolling distros, ensures
  # the binaries run on Ubuntu 22.04 LTS, Debian 12 stable, and current Arch.
  LINUX_AMD64_RUNNER: ubuntu-22.04
  LINUX_ARM64_RUNNER: ubuntu-22.04-arm

jobs:
  # ------------------------------------------------------------------
  # Per-platform build jobs. Each produces release-ready artifacts in
  # build/dist/ and uploads them. The release job downloads everything.
  # macOS jobs intentionally absent — Phase 2b not yet implemented.
  # ------------------------------------------------------------------

  build-linux-amd64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Gio Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc pkg-config \
            libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev \
            libgles2-mesa-dev libegl1-mesa-dev libffi-dev \
            libxcursor-dev libvulkan-dev librsvg2-bin \
            libgtk-3-dev

      - name: Build Linux amd64 tarball
        run: make tarball-linux-amd64 VERSION=${{ inputs.tag || github.ref_name }}

      - uses: actions/upload-artifact@v5
        with:
          name: linux-amd64
          path: build/dist/locorum-*-linux-amd64.tar.gz
          if-no-files-found: error

  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Gio Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc pkg-config \
            libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev \
            libgles2-mesa-dev libegl1-mesa-dev libffi-dev \
            libxcursor-dev libvulkan-dev librsvg2-bin \
            libgtk-3-dev

      - name: Build Linux arm64 tarball
        run: make tarball-linux-arm64 VERSION=${{ inputs.tag || github.ref_name }}

      - uses: actions/upload-artifact@v5
        with:
          name: linux-arm64
          path: build/dist/locorum-*-linux-arm64.tar.gz
          if-no-files-found: error

  build-windows:
    # WiX is officially Windows-only — running it on Linux emits
    # `WIX0000: only supports Windows; behavior undefined` and fails
    # validation on otherwise valid .wxs (e.g. WIX0389 on Directory/@Name).
    # gogio cross-compiles fine from Linux but we pay the runner cost
    # for the MSI step anyway, so build everything on the Windows host.
    # Both archs handled in one job — gogio cross-compiles arm64 from x64.
    runs-on: windows-latest
    defaults:
      run:
        # GitHub Actions on Windows: `bash` resolves to Git Bash, which
        # ships with the Unix utilities (cp, rm, mkdir -p, ...) the
        # Makefile recipes assume. Without this, cmd.exe runs the recipes
        # and Unix idioms fail.
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install GNU Make
        run: choco install make -y
        shell: pwsh

      - name: Install gogio
        run: go install gioui.org/cmd/gogio@v0.9.0

      - name: Install WiX
        # .NET SDK is preinstalled on windows-latest runners. The UI
        # extension provides WixUI_Minimal, referenced by locorum.wxs.
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add --global WixToolset.UI.wixext/5.0.2
        shell: pwsh

      - name: Build Windows MSIs (amd64 + arm64)
        run: |
          export PATH="$HOME/go/bin:$LOCALAPPDATA/Microsoft/WindowsApps:$USERPROFILE/.dotnet/tools:$PATH"
          make dist-windows VERSION=${{ inputs.tag || github.ref_name }}

      - uses: actions/upload-artifact@v5
        with:
          name: windows
          path: build/dist/Locorum-*-windows-*.msi
          if-no-files-found: error

  build-macos:
    # Apple-only tools (iconutil, lipo, hdiutil) — must run on a macOS host.
    # macos-latest is currently arm64 Apple Silicon; gogio's `-arch
    # amd64,arm64` produces a universal binary regardless of host arch.
    # Unsigned per D1: README documents the Gatekeeper "right-click → Open"
    # workaround for first launch.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install create-dmg + librsvg
        run: brew install create-dmg librsvg

      - name: Install gogio
        run: go install gioui.org/cmd/gogio@v0.9.0

      - name: Build macOS universal .dmg
        run: |
          export PATH="$HOME/go/bin:$PATH"
          make dist-macos VERSION=${{ inputs.tag || github.ref_name }}

      - uses: actions/upload-artifact@v5
        with:
          name: macos
          path: build/dist/Locorum-*-macos-*.dmg
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Release job: collect artifacts, checksum them, publish release.
  # ------------------------------------------------------------------

  # ------------------------------------------------------------------
  # SBOM, signing, and release publication. Per TESTING.md §3.11:
  #
  #   - syft generates a CycloneDX + SPDX SBOM per artifact.
  #   - cosign sign-blob signs every artifact via GitHub OIDC (keyless).
  #   - goreleaser publishes the GitHub release in draft mode.
  #
  # SLSA L3 provenance is generated by a separate reusable workflow job
  # (slsa-github-generator) referenced below.
  # ------------------------------------------------------------------

  sign-and-sbom:
    runs-on: ubuntu-22.04
    needs: [build-linux-amd64, build-linux-arm64, build-windows, build-macos]
    permissions:
      contents: read
      id-token: write   # required for cosign keyless OIDC
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: build/dist
          merge-multiple: true

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SBOM per artifact
        run: |
          shopt -s nullglob
          for f in build/dist/*.tar.gz build/dist/*.msi build/dist/*.dmg; do
            [ -f "$f" ] || continue
            echo "==> SBOM for $f"
            syft "$f" -o cyclonedx-json="$f.cdx.json"
            syft "$f" -o spdx-json="$f.spdx.json"
          done

      - name: Cosign keyless sign each artifact
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          shopt -s nullglob
          for f in build/dist/*.tar.gz build/dist/*.msi build/dist/*.dmg; do
            [ -f "$f" ] || continue
            echo "==> sign $f"
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.cert" \
              "$f"
          done

      - name: Compute SHA256 for SLSA provenance
        id: hashes
        run: |
          set -e
          hashes=$(sha256sum build/dist/*.{tar.gz,msi,dmg} 2>/dev/null | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v5
        with:
          name: signed-artifacts
          path: |
            build/dist/*.tar.gz
            build/dist/*.msi
            build/dist/*.dmg
            build/dist/*.sig
            build/dist/*.cert
            build/dist/*.cdx.json
            build/dist/*.spdx.json
          if-no-files-found: error

  # SLSA Level 3 provenance via the upstream reusable workflow. Generates
  # a signed attestation that ties each artifact's SHA256 to this exact
  # workflow + commit. Verifiable with slsa-verifier.
  provenance:
    needs: [sign-and-sbom]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.sign-and-sbom.outputs.hashes }}
      upload-assets: false
      provenance-name: locorum.intoto.jsonl

  release:
    runs-on: ubuntu-22.04
    needs: [sign-and-sbom, provenance]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}
          # Goreleaser's github-native changelog needs full history.
          fetch-depth: 0

      - name: Download signed artifacts
        uses: actions/download-artifact@v5
        with:
          name: signed-artifacts
          path: build/dist

      - name: Download SLSA provenance
        uses: actions/download-artifact@v5
        with:
          name: locorum.intoto.jsonl
          path: build/dist

      - name: List artifacts
        run: ls -la build/dist/

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          # --clean wipes goreleaser's own dist (build/release/), not our
          # pre-built artifacts (build/dist/). Safe and idempotent.
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

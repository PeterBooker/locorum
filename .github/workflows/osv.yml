name: OSV scanner

on:
  schedule:
    - cron: '0 8 * * 1'  # Mondays 08:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read
  security-events: write

jobs:
  osv:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./

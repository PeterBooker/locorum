; locorum-generated — DO NOT EDIT.
; Remove this line to take ownership; Locorum will then leave this file alone.

; This file is bind-mounted into every Locorum PHP container as
; /usr/local/etc/php/conf.d/zzz-spx.ini. It is loaded after the wodby
; image's own zz-spx.ini (which declares `extension=spx.so`), so we do
; NOT redeclare the extension here — declaring it again would risk a
; duplicate-load warning on some PHP builds.
;
; Activation is controlled per-site via PHP_EXTENSIONS_ENABLE=spx (set
; on the container by Locorum's PHPSpec when SPX is enabled for that
; site). When the env var is absent, the wodby image's default
; PHP_EXTENSIONS_DISABLE list keeps spx.so unloaded and these
; directives become inert.

spx.http_enabled = 1
spx.http_profiling_enabled = 1
spx.http_profiling_auto_start = 0

; The actual `spx.http_key = <secret>` value is provided by a per-site
; override INI bind-mounted at /usr/local/etc/php/conf.d/zzzz-spx-key.ini
; when SPX is enabled. We ship that as a separate file for two reasons:
;  - the wodby image's php-fpm pool does not forward arbitrary container
;    env vars into $_SERVER, so spx.http_key_var lookups land on an empty
;    string;
;  - a per-site INI lets each site rotate its key without rewriting any
;    shared configuration.

; Trust X-Forwarded-For from Traefik so SPX's audit / IP allowlist
; sees the developer's host IP, not the proxy's container IP.
;
; spx.http_trusted_proxies must list the IPs allowed to set that
; header. Traefik's address on Locorum's docker bridge is assigned by
; the daemon (a per-startup ephemeral 172.x.0.x), so we accept any
; proxy — combined with the random `*` key allowlist below this is
; equivalent to "only callers Traefik admitted".
spx.http_ip_var = HTTP_X_FORWARDED_FOR
spx.http_trusted_proxies = *

; PHP-FPM is reachable only via the Locorum-managed Traefik on a
; private docker bridge; SPX always requires the 32-byte crypto-random
; key on every request, so the IP allowlist is intentionally
; permissive. Tighten manually if you bind Locorum's router to a LAN
; interface.
spx.http_ip_whitelist = *

; Profile output. Mounted from <site.FilesDir>/.locorum/spx/ when SPX
; is enabled; the directory is created (and chowned) by the
; ensure-spx-dir + chown lifecycle steps before PHP-FPM starts.
spx.data_dir = /var/spx/data

<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    1024x1024 app-icon source. Reuses the 48-unit logo at assets/logo.svg,
    centered with ~10% safe margin so it sits cleanly inside the macOS
    rounded-square template. Background is transparent on purpose (revisit
    when committing to a final bundle ID and platform-specific polish).

    Transform: place 48-unit content's center (24,24) at canvas center
    (512,512), scaled by 1024 * 0.8 / 42 ~= 19.52 (height is the limiting
    dimension at 42 units).
  -->
  <g transform="translate(512 512) scale(19.52) translate(-24 -24)">
    <polygon points="24,3 42,13.5 42,34.5 24,45 6,34.5 6,13.5"
             stroke="#00d4ff" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
    <circle cx="24" cy="19" r="8.5" fill="#ff2d75"/>
    <polygon points="16.5,23 31.5,23 24,39" fill="#ff2d75"/>
    <circle cx="24" cy="19" r="3.5" fill="#ffd700"/>
  </g>
</svg>
